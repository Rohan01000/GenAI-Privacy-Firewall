<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Privacy Firewall — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a26;
            --border: #2a2a40; --accent: #00e5ff; --accent2: #7c3aed;
            --green: #00ff88; --red: #ff4466; --yellow: #ffcc00;
            --text: #e8e8f0; --muted: #6b6b8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

        header { position:relative; z-index:1; padding:16px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(10,10,15,0.8); backdrop-filter:blur(20px); }
        .logo { display:flex; align-items:center; gap:10px; }
        .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
        .logo-text { font-size:16px; font-weight:800; }
        .logo-text span { color:var(--accent); }
        .nav { display:flex; gap:12px; align-items:center; }
        .nav a { color:var(--muted); text-decoration:none; font-size:13px; font-family:'JetBrains Mono',monospace; padding:5px 10px; border-radius:6px; transition:all 0.2s; }
        .nav a:hover { color:var(--accent); background:rgba(0,229,255,0.05); }
        .nav a.active { color:var(--accent); background:rgba(0,229,255,0.1); }
        .status-bar { display:flex; align-items:center; gap:12px; }
        .badge { padding:5px 12px; border-radius:16px; font-size:11px; font-weight:600; font-family:'JetBrains Mono',monospace; background:rgba(255,204,0,0.1); border:1px solid var(--yellow); color:var(--yellow); }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
        .dot.ok { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        main { position:relative; z-index:1; flex:1; display:grid; grid-template-columns:1fr 300px; height:calc(100vh - 65px); }

        .chat-area { display:flex; flex-direction:column; border-right:1px solid var(--border); }
        .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
        .messages::-webkit-scrollbar { width:4px; }
        .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

        .message { display:flex; flex-direction:column; gap:6px; animation:slideIn 0.3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .msg-label { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
        .msg-label .d { width:5px; height:5px; border-radius:50%; }
        .user .d { background:var(--accent); }
        .assistant .d { background:var(--green); }
        .system .d { background:var(--yellow); }
        .bubble { padding:14px 18px; border-radius:10px; font-size:14px; line-height:1.6; border:1px solid var(--border); background:var(--surface); max-width:85%; white-space:pre-wrap; }
        .user .bubble { align-self:flex-end; background:rgba(0,229,255,0.05); border-color:rgba(0,229,255,0.2); }
        .assistant .bubble { background:rgba(0,255,136,0.05); border-color:rgba(0,255,136,0.15); }
        .system .bubble { background:var(--surface2); font-family:'JetBrains Mono',monospace; font-size:12px; }

        .redaction-box { max-width:85%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:11px; }
        .redaction-box .lbl { color:var(--muted); margin-bottom:6px; font-size:10px; text-transform:uppercase; letter-spacing:1px; }
        .entity-tags { display:flex; flex-wrap:wrap; gap:5px; }
        .etag { padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
        .etag-SSN,.etag-PASSWORD { background:rgba(255,68,102,0.15); color:var(--red); }
        .etag-EMAIL,.etag-IP_ADDRESS { background:rgba(0,229,255,0.1); color:var(--accent); }
        .etag-CREDIT_CARD { background:rgba(255,204,0,0.1); color:var(--yellow); }
        .etag-API_KEY { background:rgba(124,58,237,0.15); color:#a78bfa; }
        .etag-PHONE { background:rgba(0,255,136,0.1); color:var(--green); }
        .etag-default { background:rgba(107,107,138,0.2); color:var(--muted); }

        .input-area { padding:16px 20px; border-top:1px solid var(--border); background:rgba(10,10,15,0.9); }
        .input-wrap { display:flex; gap:10px; align-items:flex-end; }
        textarea { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; resize:none; outline:none; min-height:48px; max-height:180px; line-height:1.5; transition:border-color 0.2s; }
        textarea:focus { border-color:var(--accent); }
        textarea::placeholder { color:var(--muted); }
        .send { width:48px; height:48px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.15s; }
        .send:hover { transform:scale(1.05); }
        .send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .send svg { width:18px; height:18px; fill:white; }

        .sidebar { display:flex; flex-direction:column; background:var(--surface); overflow-y:auto; }
        .sb-section { padding:16px; border-bottom:1px solid var(--border); }
        .sb-title { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px; font-family:'JetBrains Mono',monospace; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .stat { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px; }
        .stat-lbl { font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace; text-transform:uppercase; }
        .stat-val { font-size:22px; font-weight:800; margin-top:2px; }
        .stat-val.blue { color:var(--accent); } .stat-val.green { color:var(--green); }
        .stat-val.red { color:var(--red); } .stat-val.yellow { color:var(--yellow); }

        .qp { display:flex; flex-direction:column; gap:5px; }
        .qp-btn { padding:8px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Syne',sans-serif; font-size:11px; cursor:pointer; text-align:left; transition:border-color 0.2s; line-height:1.4; }
        .qp-btn:hover { border-color:var(--accent); background:rgba(0,229,255,0.05); }

        .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); text-align:center; padding:40px; }
        .empty h3 { font-size:16px; color:var(--text); opacity:0.5; }
        .empty p { font-size:13px; max-width:280px; line-height:1.6; }

        .loading span { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--green); animation:bounce 1.2s infinite; margin:0 2px; }
        .loading span:nth-child(2){animation-delay:0.2s;} .loading span:nth-child(3){animation-delay:0.4s;}
        @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4;} 50%{transform:translateY(-5px);opacity:1;} }

        @media(max-width:900px) { main{grid-template-columns:1fr;} .sidebar{display:none;} }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">&#x1f6e1;&#xfe0f;</div>
        <div class="logo-text">Privacy<span>Firewall</span></div>
    </div>
    <div class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/chat.html" class="active">Chat</a>
        <a href="/audit.html">Audit</a>
    </div>
    <div class="status-bar">
        <div class="badge" id="modelBadge">...</div>
        <div class="dot" id="connDot"></div>
    </div>
</header>

<main>
    <div class="chat-area">
        <div class="messages" id="messages">
            <div class="empty" id="emptyState">
                <h3>Privacy-Protected Chat</h3>
                <p>Messages are scanned for PII before reaching the LLM. Try a prompt with an SSN, email, or API key.</p>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <textarea id="promptInput" placeholder="Type a prompt... try including PII like 123-45-6789 or test@email.com" rows="1"></textarea>
                <button class="send" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sb-section">
            <div class="sb-title">Live Stats</div>
            <div class="stats-grid">
                <div class="stat"><div class="stat-lbl">Requests</div><div class="stat-val blue" id="sTotal">0</div></div>
                <div class="stat"><div class="stat-lbl">Redacted</div><div class="stat-val green" id="sEntities">0</div></div>
                <div class="stat"><div class="stat-lbl">Blocked</div><div class="stat-val red" id="sBlocked">0</div></div>
                <div class="stat"><div class="stat-lbl">Avg ms</div><div class="stat-val yellow" id="sLatency">0</div></div>
            </div>
        </div>
        <div class="sb-section">
            <div class="sb-title">Quick Prompts</div>
            <div class="qp">
                <button class="qp-btn" onclick="useQP(this)">My SSN is 123-45-6789, is this format correct?</button>
                <button class="qp-btn" onclick="useQP(this)">Contact sarah.jones@acme.com about the Q4 report</button>
                <button class="qp-btn" onclick="useQP(this)">My AWS key is AKIAIOSFODNN7EXAMPLE, why won't it work?</button>
                <button class="qp-btn" onclick="useQP(this)">Card 4532-1234-5678-9012 keeps getting declined</button>
                <button class="qp-btn" onclick="useQP(this)">Debug: db.connect(password='Xk9#mNp2!@3') keeps failing</button>
                <button class="qp-btn" onclick="useQP(this)">User from 192.168.1.50 with SSN 789-01-2345 needs help</button>
            </div>
        </div>
    </div>
</main>

<script>
    const BASE = "http://localhost:8000";
    let defaultModel = "llama3"; // overwritten by /config

    const ta = document.getElementById('promptInput');
    ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,180)+'px'; });
    ta.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

    function useQP(btn) { ta.value=btn.textContent; ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,180)+'px'; ta.focus(); }
    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    function tagCls(t) {
        return ['SSN','EMAIL','CREDIT_CARD','API_KEY','PASSWORD','IP_ADDRESS','PHONE'].includes(t) ? `etag-${t}` : 'etag-default';
    }

    function addMsg(type, html, extra) {
        document.getElementById('emptyState')?.remove();
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        const labels = {user:'You', assistant:'LLM', system:'Firewall'};
        div.innerHTML = `<div class="msg-label"><div class="d"></div>${labels[type]}<span style="margin-left:auto;font-size:9px;">${new Date().toLocaleTimeString()}</span></div><div class="bubble">${html}</div>`;
        if(extra) div.innerHTML += extra;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function redactionHtml(fw) {
        if(!fw||!fw.entities||fw.entities.length===0) return '';
        return `<div class="redaction-box"><div class="lbl">Firewall redacted ${fw.entities.length} entit${fw.entities.length===1?'y':'ies'} (${fw.model_type})</div><div class="entity-tags">${fw.entities.map(e=>`<span class="etag ${tagCls(e.entity_type)}">${esc(e.original)} &rarr; ${esc(e.placeholder)}</span>`).join('')}</div></div>`;
    }

    function addLoading() {
        document.getElementById('emptyState')?.remove();
        const msgs=document.getElementById('messages');
        const div=document.createElement('div'); div.id='loadingMsg'; div.className='message assistant';
        div.innerHTML=`<div class="msg-label"><div class="d"></div>Processing...</div><div class="loading"><span></span><span></span><span></span></div>`;
        msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
    }

    async function sendMessage() {
        const prompt=ta.value.trim(); if(!prompt) return;
        const btn=document.getElementById('sendBtn'); btn.disabled=true;
        ta.value=''; ta.style.height='auto';
        addMsg('user', esc(prompt));
        addLoading();
        try {
            const res = await fetch(`${BASE}/chat`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ model: defaultModel, messages:[{role:'user',content:prompt}] })
            });
            document.getElementById('loadingMsg')?.remove();
            if(!res.ok) {
                let d=res.statusText; try{const e=await res.json();d=e.detail||d;}catch{}
                addMsg('system',`Error ${res.status}: ${esc(d)}`);
            } else {
                const data=await res.json();
                addMsg('assistant', esc(data?.response||'(no response)'), redactionHtml(data?.firewall));
            }
        } catch(err) {
            document.getElementById('loadingMsg')?.remove();
            addMsg('system',`Connection error: ${esc(err.message)}`);
        }
        fetchStats(); btn.disabled=false;
    }

    async function fetchStats() {
        try {
            const r=await fetch(`${BASE}/admin/stats`); if(!r.ok) return; const d=await r.json();
            document.getElementById('sTotal').textContent=d.total_requests;
            document.getElementById('sEntities').textContent=d.total_entities_redacted;
            document.getElementById('sBlocked').textContent=d.requests_blocked;
            document.getElementById('sLatency').textContent=d.avg_latency_ms?.toFixed(1)||'0';
            document.getElementById('modelBadge').textContent = d.model_type==='scratch'?'BiLSTM-CRF':'Regex';
            document.getElementById('connDot').classList.add('ok');
        } catch { document.getElementById('connDot').classList.remove('ok'); }
    }

    async function loadConfig() {
        try {
            const r=await fetch(`${BASE}/config`); if(!r.ok) return; const d=await r.json();
            defaultModel = d.default_model;
        } catch {}
    }

    loadConfig(); fetchStats(); setInterval(fetchStats, 5000);
</script>
</body>
</html>
