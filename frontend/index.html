<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Privacy Firewall - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a2e; --card-bg: #16213e; --text-light: #ffffff;
            --text-muted: #a0a0b0; --accent-blue: #0f3460; --accent-green: #00d4aa;
            --accent-red: #ff4757; --accent-purple: #9b59b6; --accent-orange: #f39c12;
            --border-color: #2a2a4a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .header { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 22px; }
        .nav { display: flex; gap: 12px; align-items: center; }
        .nav a { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 5px 10px; border-radius: 6px; }
        .nav a:hover { color: var(--accent-green); }
        .nav a.active { color: var(--accent-green); }
        .badge { padding: 5px 12px; border-radius: 16px; font-weight: bold; font-size: 12px; background-color: var(--accent-orange); color: #fff; }
        .card { background-color: var(--card-bg); border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .stat-value { font-size: 36px; font-weight: bold; margin-top: 10px; }
        .val-blue { color: #4a80e8; } .val-green { color: var(--accent-green); }
        .val-red { color: var(--accent-red); } .val-purple { color: var(--accent-purple); }
        .chart-container { grid-column: span 2; background-color: var(--card-bg); border-radius: 8px; padding: 20px; height: 300px; position: relative; }
        .chart-container h3 { margin-top: 0; margin-bottom: 15px; color: var(--text-muted); }
        .table-section { grid-column: 1/-1; background-color: var(--card-bg); border-radius: 8px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 600; }
        .row-clean { background-color: rgba(0, 212, 170, 0.05); }
        .row-redacted { background-color: rgba(255, 215, 0, 0.1); }
        .last-updated { font-size: 12px; color: var(--text-muted); grid-column: 1/-1; text-align: right; }
    </style>
</head>
<body>
<div class="grid">
    <div class="header">
        <h1>GenAI Privacy Firewall</h1>
        <div class="nav">
            <a href="/dashboard.html" class="active">Dashboard</a>
            <a href="/chat.html">Chat</a>
            <a href="/audit.html">Audit</a>
            <div id="modelBadge" class="badge">Loading...</div>
        </div>
    </div>

    <div class="card">
        <div style="color:var(--text-muted);">Total Requests</div>
        <div class="stat-value val-blue" id="val-total">0</div>
    </div>
    <div class="card">
        <div style="color:var(--text-muted);">Entities Redacted</div>
        <div class="stat-value val-green" id="val-entities">0</div>
    </div>
    <div class="card">
        <div style="color:var(--text-muted);">Blocked Requests</div>
        <div class="stat-value val-red" id="val-blocked">0</div>
    </div>
    <div class="card">
        <div style="color:var(--text-muted);">Avg Latency (ms)</div>
        <div class="stat-value val-purple" id="val-latency">0</div>
    </div>

    <div class="chart-container">
        <h3>Entity Type Breakdown</h3>
        <canvas id="donutChart"></canvas>
    </div>
    <div class="chart-container">
        <h3>Requests Per Hour (Last 24h)</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="table-section">
        <h3 style="margin-top:0;color:var(--text-muted);">Live Request Log (Last 20)</h3>
        <table>
            <thead><tr><th>Time</th><th>Request ID</th><th>Entities</th><th>Redacted</th><th>Latency (ms)</th><th>Status</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="last-updated" id="last-updated">Last Updated: --</div>
</div>

<script>
    const BASE = "http://localhost:8000";
    let donutChart = null, lineChart = null;
    let cur = { total:0, entities:0, blocked:0, latency:0 };

    Chart.defaults.color = '#a0a0b0';
    Chart.defaults.borderColor = '#2a2a4a';

    function initCharts() {
        donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
            type:'doughnut',
            data:{labels:[],datasets:[{data:[],backgroundColor:['#ff4757','#f39c12','#00d4aa','#3498db','#9b59b6','#e67e22','#1abc9c'],borderWidth:0}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}},cutout:'70%'}
        });
        const labels24h = Array.from({length:24},(_,i)=>{let d=new Date();d.setHours(d.getHours()-(23-i));return d.getHours()+":00";});
        lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), {
            type:'line',
            data:{labels:labels24h,datasets:[{label:'Requests',data:[],borderColor:'#0f3460',backgroundColor:'rgba(15,52,96,0.5)',fill:true,tension:0.4}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
        });
    }

    function anim(id, from, to, ms) {
        if(from===to) return;
        const el=document.getElementById(id); let start=null;
        const step=ts=>{if(!start)start=ts;const p=Math.min((ts-start)/ms,1);const v=p*(to-from)+from;el.innerHTML=id==='val-latency'?v.toFixed(1):Math.floor(v);if(p<1)requestAnimationFrame(step);else el.innerHTML=id==='val-latency'?to.toFixed(1):to;};
        requestAnimationFrame(step);
    }

    async function fetchStats() {
        try {
            const r=await fetch(`${BASE}/admin/stats`); if(!r.ok) return; const d=await r.json();
            anim('val-total',cur.total,d.total_requests,800);
            anim('val-entities',cur.entities,d.total_entities_redacted,800);
            anim('val-blocked',cur.blocked,d.requests_blocked,800);
            anim('val-latency',cur.latency,d.avg_latency_ms,800);
            cur={total:d.total_requests,entities:d.total_entities_redacted,blocked:d.requests_blocked,latency:d.avg_latency_ms};

            const badge=document.getElementById('modelBadge');
            badge.innerText = d.model_type==='scratch'?'BiLSTM-CRF':'Regex';

            const labels=Object.keys(d.entity_type_breakdown), values=Object.values(d.entity_type_breakdown);
            if(labels.length>0){donutChart.data.labels=labels;donutChart.data.datasets[0].data=values;donutChart.update();}
            lineChart.data.datasets[0].data=d.requests_per_hour;lineChart.update();
            document.getElementById('last-updated').innerText=`Last Updated: ${new Date().toLocaleTimeString()}`;
        } catch(e){console.error(e);}
    }

    async function fetchRecent() {
        try {
            const r=await fetch(`${BASE}/admin/recent-requests`); if(!r.ok) return; const data=await r.json();
            const tbody=document.getElementById('table-body'); tbody.innerHTML='';
            data.slice(0,20).forEach(req=>{
                let cls='row-clean',st='Clean';
                if(req.blocked){cls='row-blocked';st='Blocked';}
                else if(req.redaction_applied){cls='row-redacted';st='Redacted';}
                const tr=document.createElement('tr'); tr.className=cls;
                tr.innerHTML=`<td>${new Date(req.timestamp).toLocaleTimeString()}</td><td style="font-family:monospace;">${(req.request_id||'').split('-')[0]}</td><td>${req.entity_count}</td><td>${req.redaction_applied?'Yes':'No'}</td><td>${req.latency_ms.toFixed(1)}</td><td><strong>${st}</strong></td>`;
                tbody.appendChild(tr);
            });
        } catch(e){console.error(e);}
    }

    window.onload=()=>{initCharts();fetchStats();fetchRecent();setInterval(fetchStats,5000);setInterval(fetchRecent,5000);};
</script>
</body>
</html>
