<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Privacy Firewall - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --card-bg: #16213e;
            --text-light: #ffffff;
            --text-muted: #a0a0b0;
            --accent-blue: #0f3460;
            --accent-green: #00d4aa;
            --accent-red: #ff4757;
            --accent-purple: #9b59b6;
            --accent-orange: #f39c12;
            --border-color: #2a2a4a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .header h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px;}
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .badge.bilstm { background-color: var(--accent-orange); color: #fff; }
        .badge.bert { background-color: var(--accent-blue); color: #fff; border: 1px solid #4a80e8; }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-top: 10px;
        }

        .val-blue { color: #4a80e8; }
        .val-green { color: var(--accent-green); }
        .val-red { color: var(--accent-red); }
        .val-purple { color: var(--accent-purple); }

        /* Charts Section */
        .chart-container {
            grid-column: span 2;
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            height: 300px;
            position: relative;
        }

        .chart-container h3 { margin-top: 0; margin-bottom: 15px; color: var(--text-muted); }

        /* Table Section */
        .table-section {
            grid-column: 1 / -1;
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 600; }
        
        .row-clean { background-color: rgba(0, 212, 170, 0.05); }
        .row-redacted { background-color: rgba(255, 215, 0, 0.1); }
        .row-blocked { background-color: rgba(255, 71, 87, 0.1); }

        /* Config Panel */
        .config-panel {
            grid-column: 1 / -1;
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px;}
        .input-group label { color: var(--text-muted); font-size: 14px; }
        .input-group input, .input-group select {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            color: white;
            outline: none;
        }

        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 18px;
        }
        button:hover { background-color: #1a5299; }
        
        #toast {
            margin-left: 15px;
            font-weight: bold;
            margin-top: 18px;
        }

        .last-updated { font-size: 12px; color: var(--text-muted); grid-column: 1/-1; text-align: right; }

    </style>
</head>
<body>

<div class="grid-container">
    <div class="header">
        <h1>🛡️ GenAI Privacy Firewall</h1>
        <div id="modelBadge" class="badge bilstm">Loading...</div>
    </div>

    <div class="card">
        <div style="color: var(--text-muted);">Total Requests</div>
        <div class="stat-value val-blue" id="val-total">0</div>
    </div>
    <div class="card">
        <div style="color: var(--text-muted);">Entities Redacted</div>
        <div class="stat-value val-green" id="val-entities">0</div>
    </div>
    <div class="card">
        <div style="color: var(--text-muted);">Blocked Requests</div>
        <div class="stat-value val-red" id="val-blocked">0</div>
    </div>
    <div class="card">
        <div style="color: var(--text-muted);">Avg Latency (ms)</div>
        <div class="stat-value val-purple" id="val-latency">0</div>
    </div>

    <div class="chart-container">
        <h3>Entity Type Breakdown</h3>
        <canvas id="donutChart"></canvas>
    </div>
    <div class="chart-container">
        <h3>Requests Per Hour (Last 24h)</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="table-section">
        <h3 style="margin-top: 0; color: var(--text-muted);">Live Request Log (Last 20)</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Request ID</th>
                    <th>Entities</th>
                    <th>Redacted</th>
                    <th>Latency (ms)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <div class="config-panel">
        <div class="input-group">
            <label>Admin Secret Key</label>
            <input type="password" id="cfg-key" placeholder="Enter Admin Key">
        </div>
        <div class="input-group">
            <label>Confidence Threshold</label>
            <input type="number" id="cfg-threshold" step="0.05" min="0.0" max="1.0" placeholder="e.g. 0.85">
        </div>
        <div class="input-group">
            <label>Model Type</label>
            <select id="cfg-model">
                <option value="">(No Change)</option>
                <option value="scratch">BiLSTM-CRF</option>
                <option value="bert">BERT</option>
            </select>
        </div>
        <div class="input-group">
            <label>Rate Limit (Req/Min)</label>
            <input type="number" id="cfg-rate" placeholder="e.g. 60">
        </div>
        <button onclick="applyConfig()">Apply Config</button>
        <div id="toast"></div>
    </div>
    
    <div class="last-updated" id="last-updated">Last Updated: --</div>
</div>

<script>
    const BASE_URL = "http://localhost:8000";
    
    // Chart instances
    let donutChart = null;
    let lineChart = null;

    // Globals to track values for animations
    let currentStats = { total: 0, entities: 0, blocked: 0, latency: 0 };

    Chart.defaults.color = '#a0a0b0';
    Chart.defaults.borderColor = '#2a2a4a';

    function initCharts() {
        const ctxDonut = document.getElementById('donutChart').getContext('2d');
        donutChart = new Chart(ctxDonut, {
            type: 'doughnut',
            data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ff4757', '#f39c12', '#00d4aa', '#3498db', '#9b59b6', '#e67e22', '#1abc9c'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '70%' }
        });

        const ctxLine = document.getElementById('lineChart').getContext('2d');
        const labels24h = Array.from({length: 24}, (_, i) => {
            let d = new Date(); d.setHours(d.getHours() - (23 - i));
            return d.getHours() + ":00";
        });

        lineChart = new Chart(ctxLine, {
            type: 'line',
            data: { labels: labels24h, datasets: [{ label: 'Requests', data: [], borderColor: '#0f3460', backgroundColor: 'rgba(15, 52, 96, 0.5)', fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function animateValue(id, start, end, duration) {
        if (start === end) return;
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const val = progress * (end - start) + start;
            obj.innerHTML = id === 'val-latency' ? val.toFixed(1) : Math.floor(val);
            if (progress < 1) { window.requestAnimationFrame(step); }
            else { obj.innerHTML = id === 'val-latency' ? end.toFixed(1) : end; }
        };
        window.requestAnimationFrame(step);
    }

    function updateBadge(modelType) {
        const badge = document.getElementById('modelBadge');
        if (modelType === 'scratch') {
            badge.className = 'badge bilstm';
            badge.innerText = 'BiLSTM-CRF Active';
        } else if (modelType === 'bert') {
            badge.className = 'badge bert';
            badge.innerText = 'BERT Active';
        }
    }

    async function fetchStats() {
        const adminKey = document.getElementById('cfg-key').value || ""; 
        try {
            const res = await fetch(`${BASE_URL}/admin/stats`, { headers: { 'X-Admin-Key': adminKey } });
            if (!res.ok) throw new Error("Auth/Network Error");
            const data = await res.json();

            animateValue("val-total", currentStats.total, data.total_requests, 1000);
            animateValue("val-entities", currentStats.entities, data.total_entities_redacted, 1000);
            animateValue("val-blocked", currentStats.blocked, data.requests_blocked, 1000);
            animateValue("val-latency", currentStats.latency, data.avg_latency_ms, 1000);
            
            currentStats = { total: data.total_requests, entities: data.total_entities_redacted, blocked: data.requests_blocked, latency: data.avg_latency_ms };

            updateBadge(data.model_type);

            // Update Donut
            const labels = Object.keys(data.entity_type_breakdown);
            const values = Object.values(data.entity_type_breakdown);
            if (labels.length > 0) {
                donutChart.data.labels = labels;
                donutChart.data.datasets[0].data = values;
                donutChart.update();
            }

            // Update Line
            lineChart.data.datasets[0].data = data.requests_per_hour;
            lineChart.update();

            document.getElementById('last-updated').innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error(e); }
    }

    async function fetchRecent() {
        const adminKey = document.getElementById('cfg-key').value || "";
        try {
            const res = await fetch(`${BASE_URL}/admin/recent-requests`, { headers: { 'X-Admin-Key': adminKey } });
            if (!res.ok) return;
            const data = await res.json();
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Limit to 20 for UI
            const displayData = data.slice(0, 20);

            displayData.forEach(req => {
                let rowClass = 'row-clean';
                let statusText = 'Allowed';
                if (req.blocked) { rowClass = 'row-blocked'; statusText = 'Blocked'; }
                else if (req.redaction_applied) { rowClass = 'row-redacted'; statusText = 'Redacted'; }

                const timeStr = new Date(req.timestamp).toLocaleTimeString();
                const shortId = req.request_id ? req.request_id.split('-')[0] : 'sys';

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td>${timeStr}</td>
                    <td style="font-family: monospace;">${shortId}</td>
                    <td>${req.entity_count}</td>
                    <td>${req.redaction_applied ? 'Yes' : 'No'}</td>
                    <td>${req.latency_ms.toFixed(1)}</td>
                    <td><strong>${statusText}</strong></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) { console.error(e); }
    }

    async function applyConfig() {
        const toast = document.getElementById('toast');
        toast.innerText = "Applying...";
        toast.style.color = "var(--text-muted)";

        const adminKey = document.getElementById('cfg-key').value;
        if (!adminKey) {
            toast.innerText = "Error: Admin Key required";
            toast.style.color = "var(--accent-red)";
            return;
        }

        const payload = {};
        const thresh = document.getElementById('cfg-threshold').value;
        const mod = document.getElementById('cfg-model').value;
        const rate = document.getElementById('cfg-rate').value;

        if (thresh) payload.confidence_threshold = parseFloat(thresh);
        if (mod) payload.model_type = mod;
        if (rate) payload.rate_limit_per_minute = parseInt(rate);

        if (Object.keys(payload).length === 0) {
            toast.innerText = "No changes specified.";
            return;
        }

        try {
            const res = await fetch(`${BASE_URL}/admin/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                toast.innerText = "Configuration Updated Successfully!";
                toast.style.color = "var(--accent-green)";
                fetchStats(); // Force refresh to show changes instantly
            } else {
                toast.innerText = "Error: Unauthorized or Invalid Data";
                toast.style.color = "var(--accent-red)";
            }
        } catch (e) {
            toast.innerText = "Network Error";
            toast.style.color = "var(--accent-red)";
        }
        
        setTimeout(() => { toast.innerText = ""; }, 3000);
    }

    // Initialization
    window.onload = () => {
        initCharts();
        fetchStats();
        fetchRecent();
        
        // Auto-refresh loop
        setInterval(fetchStats, 5000);
        setInterval(fetchRecent, 5000);
    };
</script>
</body>
</html>
