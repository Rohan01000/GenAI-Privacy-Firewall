<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Privacy Firewall - Admin Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px;}
        button { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #ecf0f1; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word;}
        .entity { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Privacy Firewall Dashboard</h1>
        
        <div class="form-group">
            <label for="adminKey">Admin Secret Key:</label>
            <input type="text" id="adminKey" value="dev-secret-key">
        </div>

        <div class="form-group">
            <label for="promptInput">Test Prompt Redaction:</label>
            <textarea id="promptInput" placeholder="Enter a prompt containing PII (e.g., 'My phone number is 555-123-4567')"></textarea>
        </div>
        
        <button onclick="analyzeText()">Analyze & Redact</button>

        <div class="result-box" id="resultOutput">
            <em>Results will appear here...</em>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('promptInput').value;
            const adminKey = document.getElementById('adminKey').value;
            const output = document.getElementById('resultOutput');
            
            if (!text) return;
            
            output.innerHTML = "<em>Analyzing...</em>";
            
            try {
                const response = await fetch('/admin/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-token': adminKey
                    },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                output.innerHTML = `<strong>Redacted Text:</strong><br><br>${data.redacted_text}<br><br><strong>Entities Found:</strong><br><pre>${JSON.stringify(data.entities, null, 2)}</pre>`;
            } catch (error) {
                output.innerHTML = `<span class="entity">Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
